name: Build and Push Component Docker Images

on:
  push:
    branches: [main, alpha]
    paths:
      - '.github/workflows/components-build-deploy.yml'
      - 'components/manifests/**'
      - 'components/runners/**'
      - 'components/ambient-api-server/**'
      - 'components/ambient-control-plane/**'
      - 'components/ambient-mcp/**'
      - 'components/ambient-ui/**'
      - 'components/credential-sidecars/**'
  pull_request:
    branches: [main, alpha]
    paths:
      - '.github/workflows/components-build-deploy.yml'
      - 'components/manifests/**'
      - 'components/runners/**'
      - 'components/ambient-api-server/**'
      - 'components/ambient-control-plane/**'
      - 'components/ambient-mcp/**'
      - 'components/ambient-ui/**'
      - 'components/credential-sidecars/**'
  workflow_dispatch:
    inputs:
      components:
        description: 'Components to build (comma-separated: ambient-runner,ambient-api-server,ambient-control-plane,ambient-mcp,ambient-ui,credential-github,credential-jira,credential-k8s,credential-google) - leave empty for all'
        required: false
        type: string
        default: ''

concurrency:
  group: components-build-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      build-matrix: ${{ steps.matrix.outputs.build-matrix }}
      merge-matrix: ${{ steps.matrix.outputs.merge-matrix }}
      built-images: ${{ steps.matrix.outputs.built-images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changed components
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            ambient-runner:
              - 'components/runners/ambient-runner/**'
            ambient-api-server:
              - 'components/ambient-api-server/**'
            ambient-control-plane:
              - 'components/ambient-control-plane/**'
            ambient-mcp:
              - 'components/ambient-mcp/**'
            ambient-ui:
              - 'components/ambient-ui/**'
            credential-github:
              - 'components/credential-sidecars/github/**'
            credential-jira:
              - 'components/credential-sidecars/jira/**'
            credential-k8s:
              - 'components/credential-sidecars/k8s/**'
            credential-google:
              - 'components/credential-sidecars/google/**'

      - name: Build component matrices
        id: matrix
        env:
          CHANGES_JSON: ${{ toJSON(steps.changes.outputs) }}
        run: |
          ALL_COMPONENTS='[
            {"name":"ambient-runner","context":"./components/runners/ambient-runner","image":"quay.io/ambient_code/acp_claude_runner","dockerfile":"./components/runners/ambient-runner/Dockerfile"},
            {"name":"ambient-api-server","context":"./components/ambient-api-server","image":"quay.io/ambient_code/acp_api_server","dockerfile":"./components/ambient-api-server/Dockerfile"},
            {"name":"ambient-control-plane","context":"./components","image":"quay.io/ambient_code/acp_control_plane","dockerfile":"./components/ambient-control-plane/Dockerfile"},
            {"name":"ambient-mcp","context":"./components/ambient-mcp","image":"quay.io/ambient_code/acp_mcp","dockerfile":"./components/ambient-mcp/Dockerfile"},
            {"name":"ambient-ui","context":"./components","image":"quay.io/ambient_code/acp_ambient_ui","dockerfile":"./components/ambient-ui/Dockerfile"},
            {"name":"credential-github","context":"./components","image":"quay.io/ambient_code/acp_credential_github","dockerfile":"./components/credential-sidecars/github/Dockerfile"},
            {"name":"credential-jira","context":"./components","image":"quay.io/ambient_code/acp_credential_jira","dockerfile":"./components/credential-sidecars/jira/Dockerfile"},
            {"name":"credential-k8s","context":"./components","image":"quay.io/ambient_code/acp_credential_k8s","dockerfile":"./components/credential-sidecars/k8s/Dockerfile"},
            {"name":"credential-google","context":"./components","image":"quay.io/ambient_code/acp_credential_google","dockerfile":"./components/credential-sidecars/google/Dockerfile"}
          ]'

          SELECTED="${{ github.event.inputs.components }}"

          if [ -n "$SELECTED" ]; then
            # Manual dispatch: build only selected components
            FILTERED=$(echo "$ALL_COMPONENTS" | jq -c --arg sel "$SELECTED" '[.[] | select(.name as $n | $sel | split(",") | map(gsub("^\\s+|\\s+$";"")) | index($n))]')
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR: build only changed components
            FILTERED=$(echo "$ALL_COMPONENTS" | jq -c --argjson changes "$CHANGES_JSON"               '[.[] | select(.name as $n | $changes[$n] == "true")]')
            if [ "$FILTERED" = "[]" ]; then
              echo "No component changes detected, building all"
              FILTERED="$ALL_COMPONENTS"
            fi
          else
            # Push to main/alpha: build all
            FILTERED="$ALL_COMPONENTS"
          fi

          echo "build-matrix=$(echo "$FILTERED" | jq -c '.')" >> $GITHUB_OUTPUT
          echo "merge-matrix=$(echo "$FILTERED" | jq -c '[.[] | {name, image}]')" >> $GITHUB_OUTPUT
          echo "built-images=$(echo "$FILTERED" | jq -c '[.[].image]')" >> $GITHUB_OUTPUT

          echo "Components to build:"
          echo "$FILTERED" | jq -r '.[].name'

  build-amd64:
    needs: build-matrix
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.build-matrix.outputs.build-matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push ${{ matrix.component.name }} (amd64)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ matrix.component.image }}:${{ github.sha }}-amd64
          build-args: |
            AMBIENT_VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-amd64

      - name: Build and push ${{ matrix.component.name }} (amd64) for pull request
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ matrix.component.image }}:pr-${{ github.event.pull_request.number }}-amd64
          build-args: |
            AMBIENT_VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-amd64

  build-arm64:
    needs: build-matrix
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.build-matrix.outputs.build-matrix) }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push ${{ matrix.component.name }} (arm64)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ matrix.component.image }}:${{ github.sha }}-arm64
          build-args: |
            AMBIENT_VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-arm64

      - name: Build and push ${{ matrix.component.name }} (arm64) for pull request
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ matrix.component.image }}:pr-${{ github.event.pull_request.number }}-arm64
          build-args: |
            AMBIENT_VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-arm64

  merge-manifests:
    needs: [build-matrix, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.build-matrix.outputs.merge-matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Create multi-arch manifest for ${{ matrix.component.name }} (main)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        # Suffixes (-amd64, -arm64) must match the arch matrix in the build job above.
        # Arch-suffixed tags remain in the registry after merging. Clean these up
        # via Quay tag expiration policies or a periodic job.
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.component.image }}:latest \
            -t ${{ matrix.component.image }}:${{ github.sha }} \
            ${{ matrix.component.image }}:${{ github.sha }}-amd64 \
            ${{ matrix.component.image }}:${{ github.sha }}-arm64

      - name: Create multi-arch manifest for ${{ matrix.component.name }} (alpha)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/alpha'
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.component.image }}:alpha \
            -t ${{ matrix.component.image }}:${{ github.sha }} \
            ${{ matrix.component.image }}:${{ github.sha }}-amd64 \
            ${{ matrix.component.image }}:${{ github.sha }}-arm64

      - name: Create multi-arch manifest for ${{ matrix.component.name }} (pull request)
        if: github.event_name == 'pull_request'
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.component.image }}:pr-${{ github.event.pull_request.number }} \
            ${{ matrix.component.image }}:pr-${{ github.event.pull_request.number }}-amd64 \
            ${{ matrix.component.image }}:pr-${{ github.event.pull_request.number }}-arm64

  test-local-dev:
    needs: [build-matrix, build-amd64]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/test-local-dev.yml
    with:
      image-tag: pr-${{ github.event.pull_request.number }}
      built-images: ${{ needs.build-matrix.outputs.built-images }}

  deploy-rhoai-mlflow:
    runs-on: ubuntu-latest
    needs: [build-matrix]
    if: always() && !cancelled() && (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift Cluster
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }}

      - name: Deploy Service Mesh operator via OLM
        run: |
          oc apply -f components/manifests/components/openshift-ai/service-mesh-namespace.yaml
          oc apply -f components/manifests/components/openshift-ai/service-mesh-operatorgroup.yaml
          oc apply -f components/manifests/components/openshift-ai/service-mesh-subscription.yaml

      - name: Deploy RHOAI operator via OLM
        run: |
          oc apply -f components/manifests/components/openshift-ai/namespace.yaml
          oc apply -f components/manifests/components/openshift-ai/operatorgroup.yaml
          oc apply -f components/manifests/components/openshift-ai/subscription.yaml

      - name: Wait for RHOAI operator to be ready
        run: |
          echo "Waiting for RHOAI operator CSV to appear..."
          for i in $(seq 1 60); do
            CSV=$(oc get subscription rhods-operator -n redhat-ods-operator \
              -o jsonpath='{.status.installedCSV}' 2>/dev/null)
            if [ -n "$CSV" ]; then
              echo "Found CSV: $CSV"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::RHOAI operator CSV did not appear within timeout"
              exit 1
            fi
            echo "Attempt $i/60 - CSV not yet available, waiting 10s..."
            sleep 10
          done
          echo "Waiting for CSV $CSV to succeed..."
          oc wait csv "$CSV" -n redhat-ods-operator \
            --for=jsonpath='{.status.phase}'=Succeeded --timeout=600s

      - name: Wait for DataScienceCluster v2 API to be available
        run: |
          echo "Waiting for DataScienceCluster v2 API to be served..."
          for i in $(seq 1 60); do
            if oc api-resources --api-group=datasciencecluster.opendatahub.io 2>/dev/null | grep -q v2; then
              echo "DataScienceCluster v2 API is available"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::DataScienceCluster v2 API did not become available within timeout"
              exit 1
            fi
            echo "Attempt $i/60 - v2 API not yet available, waiting 10s..."
            sleep 10
          done

      - name: Apply DSCInitialization and DataScienceCluster
        run: |
          oc apply -f components/manifests/components/openshift-ai/dsci.yaml
          oc apply -f components/manifests/components/openshift-ai/datasciencecluster.yaml

      - name: Wait for MLflow Operator CRD to be available
        run: |
          echo "Waiting for MLflow CRD to be registered..."
          for i in $(seq 1 60); do
            if oc get crd mlflows.mlflow.opendatahub.io &>/dev/null; then
              echo "MLflow CRD is available"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::MLflow CRD did not become available within timeout"
              exit 1
            fi
            echo "Attempt $i/60 - MLflow CRD not yet available, waiting 10s..."
            sleep 10
          done

      - name: Ensure mlflow database exists in PostgreSQL
        run: |
          oc exec -n ambient-code deploy/postgresql -- \
            psql -U postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname = 'mlflow'" | grep -q 1 \
          || oc exec -n ambient-code deploy/postgresql -- \
            psql -U postgres -c "CREATE DATABASE mlflow"

      - name: Ensure mlflow-db-credentials secret exists
        run: |
          echo "Reconciling mlflow-db-credentials from postgresql-credentials..."
          DB_USER=$(oc get secret postgresql-credentials -n ambient-code -o jsonpath='{.data.db\.user}' | base64 -d)
          DB_PASS=$(oc get secret postgresql-credentials -n ambient-code -o jsonpath='{.data.db\.password}' | base64 -d)
          DB_HOST=$(oc get secret postgresql-credentials -n ambient-code -o jsonpath='{.data.db\.host}' | base64 -d)
          DB_PORT=$(oc get secret postgresql-credentials -n ambient-code -o jsonpath='{.data.db\.port}' | base64 -d)
          ENC_USER=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$DB_USER")
          ENC_PASS=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$DB_PASS")
          ENCODED_URI="postgresql://${ENC_USER}:${ENC_PASS}@${DB_HOST}.ambient-code.svc.cluster.local:${DB_PORT}/mlflow?sslmode=disable"
          oc create namespace redhat-ods-applications --dry-run=client -o yaml | oc apply -f -
          oc apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: mlflow-db-credentials
            namespace: redhat-ods-applications
          type: Opaque
          stringData:
            uri: "${ENCODED_URI}"
          EOF

      - name: Deploy MLflow instance
        run: |
          oc apply -f components/manifests/components/openshift-ai/mlflow.yaml

  update-rbac-and-crd:
    runs-on: ubuntu-latest
    needs: [build-matrix, merge-manifests]
    if: always() && !cancelled() && (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift Cluster
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }}

      - name: Apply RBAC and CRD manifests
        run: |
          oc apply -k components/manifests/base/crds/
          oc apply -k components/manifests/base/rbac/
          oc apply -f components/manifests/overlays/production/operator-config-openshift.yaml -n ambient-code

      - name: Deploy observability stack
        run: |
          oc apply -k components/manifests/observability/

  deploy-to-openshift:
    runs-on: ubuntu-latest
    needs: [merge-manifests, update-rbac-and-crd]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Log in to OpenShift Cluster
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }}

      - name: Update kustomization with SHA image tags
        working-directory: components/manifests/overlays/production
        run: |
          kustomize edit set image quay.io/ambient_code/acp_claude_runner:latest=quay.io/ambient_code/acp_claude_runner:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_api_server:latest=quay.io/ambient_code/acp_api_server:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_control_plane:latest=quay.io/ambient_code/acp_control_plane:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_mcp:latest=quay.io/ambient_code/acp_mcp:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_ambient_ui:latest=quay.io/ambient_code/acp_ambient_ui:${{ github.sha }}

      - name: Validate kustomization
        working-directory: components/manifests/overlays/production
        run: |
          kustomize build . > /dev/null
          echo "✅ Kustomization validation passed"

      - name: Apply production overlay with kustomize
        working-directory: components/manifests/overlays/production
        run: |
          oc apply -k . -n ambient-code

  deploy-with-disptach:
    runs-on: ubuntu-latest
    needs: [merge-manifests, update-rbac-and-crd]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Log in to OpenShift Cluster
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }}

      - name: Update kustomization with SHA image tags
        working-directory: components/manifests/overlays/production
        run: |
          kustomize edit set image quay.io/ambient_code/acp_claude_runner:latest=quay.io/ambient_code/acp_claude_runner:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_api_server:latest=quay.io/ambient_code/acp_api_server:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_control_plane:latest=quay.io/ambient_code/acp_control_plane:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_mcp:latest=quay.io/ambient_code/acp_mcp:${{ github.sha }}
          kustomize edit set image quay.io/ambient_code/acp_ambient_ui:latest=quay.io/ambient_code/acp_ambient_ui:${{ github.sha }}

      - name: Validate kustomization
        working-directory: components/manifests/overlays/production
        run: |
          kustomize build . > /dev/null
          echo "✅ Kustomization validation passed"

      - name: Apply production overlay with kustomize
        working-directory: components/manifests/overlays/production
        run: |
          oc apply -k . -n ambient-code
