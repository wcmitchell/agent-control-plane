name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'components/ambient-api-server/**'
      - 'components/ambient-cli/**'
      - '.github/workflows/lint.yml'
      - '!**/*.md'

  pull_request:
    branches: [main]
    paths:
      - 'components/ambient-api-server/**'
      - 'components/ambient-cli/**'
      - '.github/workflows/lint.yml'
      - '!**/*.md'

  workflow_dispatch:

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-server: ${{ steps.filter.outputs.api-server }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed components
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            api-server:
              - 'components/ambient-api-server/**/*.go'
              - 'components/ambient-api-server/go.mod'
              - 'components/ambient-api-server/go.sum'
            cli:
              - 'components/ambient-cli/**/*.go'
              - 'components/ambient-cli/go.mod'
              - 'components/ambient-cli/go.sum'

  go-api-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api-server == 'true' || github.event_name == 'workflow_dispatch'
    name: Go Lint - API Server
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'components/ambient-api-server/go.mod'
          cache-dependency-path: 'components/ambient-api-server/go.sum'

      - name: Check gofmt
        run: |
          cd components/ambient-api-server
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run 'gofmt -w .' to format them."
            exit 1
          fi

      - name: Run go vet
        run: |
          cd components/ambient-api-server
          go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          working-directory: components/ambient-api-server
          args: --timeout=5m

      - name: Check OpenAPI generated code is up to date
        run: |
          cd components/ambient-api-server
          make generate
          if ! git diff --quiet pkg/api/openapi/; then
            echo ""
            echo "============================================"
            echo "ERROR: Generated OpenAPI code is out of date"
            echo "============================================"
            echo ""
            echo "The following files differ from what 'make generate' produces:"
            git diff --name-only pkg/api/openapi/
            echo ""
            echo "Run 'cd components/ambient-api-server && make generate' and commit the result."
            exit 1
          fi
          echo "OpenAPI generated code is up to date."

  go-cli:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.cli == 'true' || github.event_name == 'workflow_dispatch'
    name: Go Lint - CLI
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'components/ambient-cli/go.mod'
          cache-dependency-path: 'components/ambient-cli/go.sum'

      - name: Check gofmt
        run: |
          cd components/ambient-cli
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run 'gofmt -w .' to format them."
            exit 1
          fi

      - name: Run go vet
        run: |
          cd components/ambient-cli
          go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          working-directory: components/ambient-cli
          args: --timeout=5m

  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, go-api-server, go-cli]
    if: always()
    steps:
      - name: Check overall status
        run: |
          failed=false
          for result in \
            "${{ needs.go-api-server.result }}" \
            "${{ needs.go-cli.result }}"; do
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              failed=true
            fi
          done
          if [ "$failed" == "true" ]; then
            echo "Linting failed"
            echo "  go-api-server: ${{ needs.go-api-server.result }}"
            echo "  go-cli: ${{ needs.go-cli.result }}"
            exit 1
          fi
          echo "All lint checks passed!"
