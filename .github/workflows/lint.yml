name: Lint

on:
  push:
    branches: [main]

  pull_request:

  merge_group:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-server: ${{ steps.detect.outputs.api-server }}
      cli: ${{ steps.detect.outputs.cli }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed components
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/detect-components.sh --outputs

  go-api-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api-server == 'true' || github.event_name == 'workflow_dispatch'
    name: Go Lint - API Server
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'components/ambient-api-server/go.mod'
          cache-dependency-path: 'components/ambient-api-server/go.sum'

      - name: Check gofmt
        run: |
          cd components/ambient-api-server
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run 'gofmt -w .' to format them."
            exit 1
          fi

      - name: Run go vet
        run: |
          cd components/ambient-api-server
          go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: components/ambient-api-server
          args: --timeout=5m

      - name: Check OpenAPI generated code is up to date
        run: |
          cd components/ambient-api-server
          make generate
          if ! git diff --quiet pkg/api/openapi/; then
            echo ""
            echo "============================================"
            echo "ERROR: Generated OpenAPI code is out of date"
            echo "============================================"
            echo ""
            echo "The following files differ from what 'make generate' produces:"
            git diff --name-only pkg/api/openapi/
            echo ""
            echo "Run 'cd components/ambient-api-server && make generate' and commit the result."
            exit 1
          fi
          echo "OpenAPI generated code is up to date."

  go-cli:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.cli == 'true' || github.event_name == 'workflow_dispatch'
    name: Go Lint - CLI
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'components/ambient-cli/go.mod'
          cache-dependency-path: 'components/ambient-cli/go.sum'

      - name: Check gofmt
        run: |
          cd components/ambient-cli
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run 'gofmt -w .' to format them."
            exit 1
          fi

      - name: Run go vet
        run: |
          cd components/ambient-cli
          go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: components/ambient-cli
          args: --timeout=5m

  summary:
    name: Lint CI Gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    needs: [detect-changes, go-api-server, go-cli]
    if: always()
    steps:
      - name: Check overall status
        run: |
          failed=false
          for result in \
            "${{ needs.go-api-server.result }}" \
            "${{ needs.go-cli.result }}"; do
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              failed=true
            fi
          done
          if [ "$failed" == "true" ]; then
            echo "Linting failed"
            echo "  go-api-server: ${{ needs.go-api-server.result }}"
            echo "  go-cli: ${{ needs.go-cli.result }}"
            exit 1
          fi
          echo "All lint checks passed!"

      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Try enqueue
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        run: bash .github/scripts/try-enqueue.sh "${{ github.event.pull_request.number }}" "Lint CI Gate"
