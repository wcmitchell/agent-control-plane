name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      js-ts: ${{ steps.filter.outputs.js-ts }}
      python: ${{ steps.filter.outputs.python }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
            js-ts:
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/package.json'
            python:
              - '**/*.py'
              - '**/pyproject.toml'
              - '**/uv.lock'
            actions:
              - '.github/workflows/**'

  analyze-go:
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:go

  analyze-javascript-typescript:
    needs: changes
    if: needs.changes.outputs.js-ts == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:javascript-typescript

  analyze-python:
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:python

  analyze-actions:
    needs: changes
    if: needs.changes.outputs.actions == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: actions
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: /language:actions

  codeql-gate:
    name: CodeQL Gate
    runs-on: ubuntu-latest
    needs: [changes, analyze-go, analyze-javascript-typescript, analyze-python, analyze-actions]
    if: always()
    permissions: {}
    timeout-minutes: 1
    steps:
      - name: Check analysis results
        run: |
          failed=false
          for result in \
            "${{ needs.analyze-go.result }}" \
            "${{ needs.analyze-javascript-typescript.result }}" \
            "${{ needs.analyze-python.result }}" \
            "${{ needs.analyze-actions.result }}"; do
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              failed=true
            fi
          done
          if [ "$failed" == "true" ]; then
            echo "CodeQL analysis failed"
            echo "  analyze-go: ${{ needs.analyze-go.result }}"
            echo "  analyze-javascript-typescript: ${{ needs.analyze-javascript-typescript.result }}"
            echo "  analyze-python: ${{ needs.analyze-python.result }}"
            echo "  analyze-actions: ${{ needs.analyze-actions.result }}"
            exit 1
          fi
          echo "All CodeQL analyses passed (or skipped — no matching file changes)"
