name: Test Local Development Environment

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to deploy (e.g. pr-42, latest)'
        required: true
        type: string
      built-images:
        description: 'JSON array of image names that were built (only these get tag override)'
        required: false
        type: string
        default: '[]'
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        type: string
        default: 'latest'

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Validate production manifest safety
      run: |
        echo "Validating production manifests do NOT contain dev mode variables..."

        while IFS= read -r manifest; do
          if grep -q "DISABLE_AUTH" "$manifest"; then
            echo "CRITICAL: Production manifest contains DISABLE_AUTH: $manifest"
            exit 1
          fi

          if grep -qE "ENVIRONMENT.*[\"']?(local|development)[\"']?" "$manifest"; then
            echo "CRITICAL: Production manifest sets ENVIRONMENT=local/development: $manifest"
            exit 1
          fi
        done < <(find components/manifests/base components/manifests/overlays/production -name "*.yaml" -o -name "*.yml" 2>/dev/null)

        echo "All production manifests are safe"

    - name: Validate Makefile
      run: |
        echo "Validating Makefile quality..."
        make validate-makefile

  ci-gate:
    name: Local Dev CI Gate
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    if: always()
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          echo "validate-manifests: ${{ needs.validate-manifests.result }}"
          if [ "${{ needs.validate-manifests.result }}" == "failure" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed or were appropriately skipped"
