name: Test Local Development Environment

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to deploy (e.g. pr-42, latest)'
        required: true
        type: string
      built-images:
        description: 'JSON array of image names that were built (only these get tag override)'
        required: false
        type: string
        default: '[]'
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        type: string
        default: 'latest'

permissions:
  contents: read

env:
  KUBECTL_VERSION: "v1.31.4"
  KIND_VERSION: "v0.31.0"
  IMAGE_TAG: ${{ inputs.image-tag || 'latest' }}
  BUILT_IMAGES: ${{ inputs.built-images || '[]' }}

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Validate production manifest safety
      run: |
        echo "Validating production manifests do NOT contain dev mode variables..."

        while IFS= read -r manifest; do
          if grep -q "DISABLE_AUTH" "$manifest"; then
            echo "CRITICAL: Production manifest contains DISABLE_AUTH: $manifest"
            exit 1
          fi

          if grep -qE "ENVIRONMENT.*[\"']?(local|development)[\"']?" "$manifest"; then
            echo "CRITICAL: Production manifest sets ENVIRONMENT=local/development: $manifest"
            exit 1
          fi
        done < <(find components/manifests/base components/manifests/overlays/production -name "*.yaml" -o -name "*.yml" 2>/dev/null)

        echo "All production manifests are safe"

    - name: Validate Makefile
      run: |
        echo "Validating Makefile quality..."
        make validate-makefile

  test-local-dev-simulation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Cleanup Diskspace
      id: cleanup
      uses: kubeflow/pipelines/.github/actions/github-disk-cleanup@67a73cf809f7c76fee33c749f302f2bceedd8fab # 2.16.1
      if: (!cancelled())

    - name: Cache kubectl and kind
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: k8s-tools-cache
      with:
        path: |
          ~/k8s-tools/kubectl
          ~/k8s-tools/kind
        key: k8s-tools-${{ runner.os }}-kubectl-${{ env.KUBECTL_VERSION }}-kind-${{ env.KIND_VERSION }}

    - name: Install kind and kubectl
      run: |
        mkdir -p ~/k8s-tools

        if [[ ! -f ~/k8s-tools/kubectl ]]; then
          echo "Downloading kubectl $KUBECTL_VERSION..."
          curl -sLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mv kubectl ~/k8s-tools/
        else
          echo "Using cached kubectl"
        fi
        sudo cp ~/k8s-tools/kubectl /usr/local/bin/kubectl

        if [[ ! -f ~/k8s-tools/kind ]]; then
          echo "Downloading kind $KIND_VERSION..."
          curl -sLO "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind-linux-amd64
          mv kind-linux-amd64 ~/k8s-tools/kind
        else
          echo "Using cached kind"
        fi
        sudo cp ~/k8s-tools/kind /usr/local/bin/kind

        kubectl version --client
        kind version

    - name: Override image tags for built components
      id: image-override
      if: env.IMAGE_TAG != 'latest'
      run: |
        cd components/manifests/overlays/kind

        ALL_IMAGES=(
          quay.io/ambient_code/acp_api_server
          quay.io/ambient_code/acp_control_plane
          quay.io/ambient_code/acp_ambient_ui
          quay.io/ambient_code/acp_claude_runner
          quay.io/ambient_code/acp_mcp
        )

        BUILT='${{ env.BUILT_IMAGES }}'

        for image in "${ALL_IMAGES[@]}"; do
          if echo "$BUILT" | jq -e --arg img "$image" 'index($img)' > /dev/null 2>&1; then
            echo "  ${image} → ${IMAGE_TAG} (built in this PR)"
            kustomize edit set image "${image}:latest=${image}:${IMAGE_TAG}-amd64"
          else
            echo "  ${image} → latest (unchanged)"
          fi
        done

        # Resolve the runner sandbox image tag (loaded separately via _kind-preload-runner)
        if echo "$BUILT" | grep -q 'runner_openshell'; then
          echo "runner_tag=${IMAGE_TAG}-amd64" >> "$GITHUB_OUTPUT"
          echo "  runner_openshell → ${IMAGE_TAG}-amd64 (built in this PR)"
        else
          echo "runner_tag=latest" >> "$GITHUB_OUTPUT"
          echo "  runner_openshell → latest (unchanged)"
        fi

    - name: Create dummy Vertex credentials
      run: |
        RSA_KEY=$(openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 2>/dev/null)
        python3 -c "
        import json, sys
        key = sys.stdin.read()
        json.dump({
          'type': 'service_account',
          'project_id': 'test',
          'private_key_id': 'dummy',
          'private_key': key,
          'client_email': 'test@test.iam.gserviceaccount.com',
          'client_id': '0',
          'auth_uri': 'https://accounts.google.com/o/oauth2/auth',
          'token_uri': 'https://oauth2.googleapis.com/token'
        }, open('/tmp/vertex.json', 'w'))
        " <<< "$RSA_KEY"

    - name: Add Keycloak host entry for OIDC gateway auth
      run: echo "127.0.0.1 keycloak-service.ambient-code.svc.cluster.local" | sudo tee -a /etc/hosts

    - name: Deploy using Makefile
      env:
        GOOGLE_APPLICATION_CREDENTIALS: /tmp/vertex.json
        ANTHROPIC_VERTEX_PROJECT_ID: test-project
        CLOUD_ML_REGION: global
      run: |
        echo "Using Makefile to deploy complete stack..."
        make kind-up CONTAINER_ENGINE=docker CI_MODE=true VERTEX_CRED=/tmp/vertex.json OPENSHELL_USE_GATEWAY=true \
          OPENSHELL_TENANTS="tenant-a" \
          RUNNER_QUAY_TAG=${{ steps.image-override.outputs.runner_tag || 'latest' }}

    - name: Wait for deployments
      run: |
        echo "Waiting for deployments..."
        kubectl wait --for=condition=available --timeout=180s -n ambient-code --all deployments || {
          echo "Deployment timeout - showing status"
          kubectl get pods -n ambient-code -o wide
          exit 1
        }
        echo "All deployments ready"

    - name: Run Makefile smoke tests
      run: |
        echo "Running Makefile smoke tests..."
        make local-test-quick CONTAINER_ENGINE=docker || {
          echo "Smoke tests failed - showing debugging information..."
          make local-troubleshoot
          exit 1
        }

    - name: Run comprehensive test suite
      run: |
        echo "Running local development test suite..."
        chmod +x tests/e2e/local-dev-test.sh

        ./tests/e2e/local-dev-test.sh --skip-setup --ci || {
          echo "Test suite failed - showing debugging information..."
          make local-troubleshoot
          exit 1
        }

    - name: Install openshell CLI
      run: pipx install openshell

    - name: Run Gateway E2E tests
      run: |
        kubectl port-forward -n ambient-code svc/ambient-api-server 13592:8000 &
        kubectl port-forward -n ambient-code svc/keycloak-service 18592:11880 &
        sleep 3

        # Wait for the gateway TLS secret — the certgen job may still be running
        for i in $(seq 1 60); do
          if kubectl get secret openshell-server-tls -n tenant-a &>/dev/null; then
            echo "openshell-server-tls secret ready in tenant-a"
            break
          fi
          echo "Waiting for openshell-server-tls secret in tenant-a... ($i/60)"
          sleep 5
        done

        # Wait for gateway pod to be ready
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=openshell-gateway \
          -n tenant-a --timeout=120s || echo "Warning: gateway pod not ready after 120s"

        PF_DIR=/tmp/ambient-code ./scripts/setup-gateway-cli.sh tenant-a

        TEST_TOKEN=$(kubectl get secret test-user-token -n ambient-code -o jsonpath='{.data.token}' | base64 -d) \
        API_URL=http://localhost:13592 \
        bash tests/e2e/gateway-e2e-test.sh || {
          echo "Gateway E2E failed - showing debugging information..."
          kubectl get pods -n tenant-a -o wide 2>&1 || true
          kubectl logs -n ambient-code -l app=ambient-control-plane --tail=50 2>&1 || true
          exit 1
        }

    - name: Run RBAC enforcement E2E tests
      run: |
        fuser -k 13592/tcp 2>/dev/null || true
        fuser -k 18592/tcp 2>/dev/null || true
        kubectl port-forward -n ambient-code svc/ambient-api-server 13592:8000 &
        kubectl port-forward -n ambient-code svc/keycloak-service 18592:11880 &
        sleep 3

        API_URL=http://localhost:13592/api/ambient/v1 \
        KC_URL=http://localhost:18592 \
        bash tests/e2e/rbac_e2e_test.sh

    - name: Run Scheduled Sessions E2E tests
      run: |
        fuser -k 13592/tcp 2>/dev/null || true
        fuser -k 18592/tcp 2>/dev/null || true
        kubectl port-forward -n ambient-code svc/ambient-api-server 13592:8000 &
        kubectl port-forward -n ambient-code svc/keycloak-service 18592:11880 &
        sleep 3

        API_URL=http://localhost:13592/api/ambient/v1 \
        KC_URL=http://localhost:18592 \
        bash tests/e2e/scheduled_sessions_e2e_test.sh

    - name: Show deployment status
      if: always()
      run: |
        echo "=== Namespace ==="
        kubectl get namespace ambient-code 2>&1 || echo "(Namespace not found)"

        echo ""
        echo "=== Deployments ==="
        kubectl get deployments -n ambient-code -o wide 2>&1 || echo "(No deployments)"

        echo ""
        echo "=== Pods ==="
        kubectl get pods -n ambient-code -o wide 2>&1 || echo "(No pods)"

        echo ""
        echo "=== Events (last 30) ==="
        kubectl get events -n ambient-code --sort-by='.lastTimestamp' 2>&1 | tail -30 || echo "(No events)"

        echo ""
        echo "=== Deployment describe (if no pods) ==="
        if ! kubectl get pods -n ambient-code 2>/dev/null | grep -q Running; then
          echo "No running pods found - describing deployments for details:"
          kubectl describe deployments -n ambient-code 2>&1 | tail -100 || echo "(no deployments)"
        fi

    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up using Makefile..."
        make kind-down 2>&1 || echo "(Cleanup failed or cluster already removed)"

  ci-gate:
    name: Local Dev CI Gate
    runs-on: ubuntu-latest
    needs: [validate-manifests, test-local-dev-simulation]
    if: always()
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          echo "validate-manifests: ${{ needs.validate-manifests.result }}"
          echo "test-local-dev-simulation: ${{ needs.test-local-dev-simulation.result }}"
          if [ "${{ needs.validate-manifests.result }}" == "failure" ] || \
             [ "${{ needs.test-local-dev-simulation.result }}" == "failure" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed or were appropriately skipped"
