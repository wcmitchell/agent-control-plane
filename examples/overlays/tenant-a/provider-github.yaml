# Prerequisite: create the backing secret in the tenant namespace:
#   kubectl create secret generic github-creds \
#     --from-literal=token="$(cat /path/to/github-pat.txt)" \
#     -n tenant-a
#
# The token must be a GitHub Personal Access Token (classic or fine-grained)
# with at least: repo (read), pull_request (read), issues (read) scopes.
kind: Provider
name: github
type: github
secret: github-creds
