apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: vteam-production

# Namespace for all resources (can be overridden with kustomize edit set namespace)
namespace: ambient-code

# Resources (base + production-specific)
# github-app-secret.yaml - excluded from automated deployment to prevent overwriting existing secret values
# Manage this secret separately: oc apply -f github-app-secret.yaml -n ambient-code
resources:
- ../../base
- ambient-api-server-route.yaml
- route.yaml
- backend-route.yaml
- public-api-route.yaml
- unleash-route.yaml
- operator-config-openshift.yaml
- ldap-config.yaml
- frontend-hpa.yaml
- ambient-ui-route.yaml

components:
- ../../components/oauth-proxy
- ../../components/postgresql-rhel
- ../../components/ambient-api-server-db
# openshift-ai is deployed separately via the deploy-rhoai-mlflow workflow job
# (requires multi-stage apply due to CRD ordering and cross-namespace resources)

# Patches for production environment
patches:
- path: namespace-patch.yaml
  target:
    kind: Namespace
    name: ambient-code
- path: ambient-api-server-env-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: ambient-api-server-jwt-args-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: ambient-api-server-service-ca-patch.yaml
  target:
    kind: Service
    name: ambient-api-server
    version: v1
- path: minio-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: minio-data
    version: v1
- path: ambient-ui-oauth-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-ui
    version: v1
- path: ambient-ui-service-patch.yaml
  target:
    kind: Service
    name: ambient-ui-service
    version: v1
# Production images
images:
- name: quay.io/ambient_code/vteam_api_server:latest
  newName: quay.io/ambient_code/vteam_api_server
  newTag: latest
- name: quay.io/ambient_code/vteam_backend
  newName: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_backend:latest
  newName: quay.io/ambient_code/vteam_backend
  newTag: latest
- name: quay.io/ambient_code/vteam_claude_runner
  newName: quay.io/ambient_code/vteam_claude_runner
  newTag: latest
- name: quay.io/ambient_code/vteam_claude_runner:latest
  newName: quay.io/ambient_code/vteam_claude_runner
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend
  newName: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_frontend:latest
  newName: quay.io/ambient_code/vteam_frontend
  newTag: latest
- name: quay.io/ambient_code/vteam_operator
  newName: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_operator:latest
  newName: quay.io/ambient_code/vteam_operator
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api
  newName: quay.io/ambient_code/vteam_public_api
  newTag: latest
- name: quay.io/ambient_code/vteam_public_api:latest
  newName: quay.io/ambient_code/vteam_public_api
  newTag: latest
- name: quay.io/ambient_code/vteam_state_sync:latest
  newName: quay.io/ambient_code/vteam_state_sync
  newTag: latest
- name: quay.io/ambient_code/vteam_control_plane:latest
  newName: quay.io/ambient_code/vteam_control_plane
  newTag: latest
- name: ghcr.io/ambient-code/observability
  newName: ghcr.io/ambient-code/observability
  newTag: latest
- name: ghcr.io/ambient-code/observability:latest
  newName: ghcr.io/ambient-code/observability
  newTag: latest
- name: quay.io/ambient_code/vteam_ambient_ui
  newName: quay.io/ambient_code/vteam_ambient_ui
  newTag: latest
- name: quay.io/ambient_code/vteam_ambient_ui:latest
  newName: quay.io/ambient_code/vteam_ambient_ui
  newTag: latest
