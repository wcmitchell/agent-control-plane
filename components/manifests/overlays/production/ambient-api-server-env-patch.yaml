apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-api-server
spec:
  template:
    spec:
      containers:
        - name: api-server
          env:
            - name: AMBIENT_ENV
              value: production
            - name: BACKEND_URL
              value: "http://backend-service.ambient-code.svc:8080"
            - name: CREDENTIAL_ENCRYPTION_ALLOW_PLAINTEXT
              value: "true"
