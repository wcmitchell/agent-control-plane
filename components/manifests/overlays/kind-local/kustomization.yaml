apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Layer on top of the kind overlay, overriding only image sources and pull policy
resources:
- ../kind

# Override patches for kind-local
patches:
- path: ambient-api-server-local-image-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server

# Override imagePullPolicy to IfNotPresent for all deployments
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server
- path: image-pull-policy-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-ui

# Remap images from Quay.io to locally-built names
# Podman tags images with localhost/ prefix, which kind preserves when loading
images:
- name: quay.io/ambient_code/acp_api_server
  newName: localhost/acp_api_server
  newTag: latest
- name: quay.io/ambient_code/acp_ambient_ui
  newName: localhost/acp_ambient_ui
  newTag: latest
