apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-code

# Resources (base + kind-specific)
resources:
- ../../base
- secrets.yaml
- test-user.yaml
# Ingress removed - using NodePort for direct access in kind
- minio-credentials.yaml
- postgresql-credentials.yaml
- mlflow-db-credentials.yaml
# PostgreSQL init scripts for database creation (kind only)
- postgresql-init-scripts.yaml
- ldap-config.yaml
- ldap-credentials.yaml
# SSO: Keycloak for local OIDC authentication
- keycloak-deployment.yaml
- sso-credentials.yaml
- e2e-rolebinding.yaml

# Patches for e2e environment
patches:
- path: ambient-api-server-dev-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: api-server-no-jwt-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: api-server-db-security-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server-db
    version: v1
- path: ambient-api-server-jwks-patch.yaml
  target:
    kind: ConfigMap
    name: ambient-api-server-auth
- path: namespace-patch.yaml
  target:
    kind: Namespace
    name: ambient-code
- path: minio-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: minio-data
- path: minio-resources-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: minio
# PostgreSQL: smaller PVC for local dev
- path: postgresql-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: postgresql-data
# PostgreSQL: add init-scripts volume for database creation
- path: postgresql-init-scripts-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: postgresql
# API server: relax runAsNonRoot for Kind (upstream image runs as root)
- path: api-server-security-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server
# Control plane: make OIDC env vars optional, use HTTP for Kind
- path: control-plane-env-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-control-plane

configMapGenerator:
- name: keycloak-realm-config
  files:
  - ambient-code-realm.json=keycloak-realm.json
  options:
    disableNameSuffixHash: true
