apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-control-plane
spec:
  template:
    spec:
      containers:
        - name: ambient-control-plane
          env:
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ambient-api-server
                  key: clientId
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ambient-api-server
                  key: clientSecret
                  optional: true
            - name: AMBIENT_API_SERVER_URL
              value: "http://ambient-api-server.ambient-code.svc.cluster.local:8000"
            - name: AMBIENT_GRPC_USE_TLS
              value: "false"
            - name: OPENSHELL_USE_GATEWAY
              value: "true"
            - name: LOCAL_IMAGES
              value: "true"
            - name: USE_VERTEX
              value: ""
              valueFrom: null
            - name: CLOUD_ML_REGION
              value: ""
              valueFrom: null
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: ""
              valueFrom: null
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: ""
              valueFrom: null
