apiVersion: v1
kind: Service
metadata:
  name: ambient-api-server-db
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-api-server
    component: database
spec:
  ports:
    - name: postgresql
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    app: ambient-api-server
    component: database
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-api-server-db
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-api-server
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambient-api-server
      component: database
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ambient-api-server
        component: database
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel10/postgresql-16:10.1
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  key: db.user
                  name: ambient-api-server-db
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: db.password
                  name: ambient-api-server-db
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  key: db.name
                  name: ambient-api-server-db
          volumeMounts:
            - name: ambient-api-server-db-data
              mountPath: /var/lib/pgsql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: ambient-api-server-db-data
          emptyDir: {}
