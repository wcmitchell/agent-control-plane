apiVersion: v1
kind: ServiceAccount
metadata:
  name: ambient-api-server
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-api-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-api-server
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-api-server
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambient-api-server
      component: api
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ambient-api-server
        component: api
    spec:
      serviceAccountName: ambient-api-server
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migration
          image: quay.io/ambient_code/acp_api_server:latest
          imagePullPolicy: Always
          command:
            - /usr/local/bin/ambient-api-server
            - migrate
            - --db-host-file=/secrets/db/db.host
            - --db-port-file=/secrets/db/db.port
            - --db-user-file=/secrets/db/db.user
            - --db-password-file=/secrets/db/db.password
            - --db-name-file=/secrets/db/db.name
            - --alsologtostderr
            - -v=4
          volumeMounts:
            - name: db-secrets
              mountPath: /secrets/db
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: api-server
          image: quay.io/ambient_code/acp_api_server:latest
          imagePullPolicy: Always
          env:
            - name: AMBIENT_ENV
              value: production
            - name: GRPC_SERVICE_ACCOUNT
              value: "service-account-ocm-ams-service"
            - name: CREDENTIAL_ENCRYPTION_ALLOW_PLAINTEXT
              value: "true"
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 4433
              protocol: TCP
            - name: health
              containerPort: 4434
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: db-secrets
              mountPath: /secrets/db
            - name: app-secrets
              mountPath: /secrets/service
            - name: auth-config
              mountPath: /configs/authentication
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/ambient
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 4434
              scheme: HTTP
              httpHeaders:
                - name: User-Agent
                  value: Probe
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: db-secrets
          secret:
            secretName: ambient-api-server-db
        - name: app-secrets
          secret:
            secretName: ambient-api-server
        - name: auth-config
          configMap:
            name: ambient-api-server-auth
---
apiVersion: v1
kind: Service
metadata:
  name: ambient-api-server
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-api-server
    component: api
spec:
  selector:
    app: ambient-api-server
    component: api
  ports:
    - name: api
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: grpc
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: metrics
      port: 4433
      targetPort: 4433
      protocol: TCP
    - name: health
      port: 4434
      targetPort: 4434
      protocol: TCP
