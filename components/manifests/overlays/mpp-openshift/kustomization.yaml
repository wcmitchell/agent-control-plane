apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ambient-mpp-openshift

resources:
- ambient-api-server-db.yaml
- ambient-api-server.yaml
- ambient-control-plane.yaml
- ambient-control-plane-svc.yaml
- ambient-cp-token-netpol.yaml
- ambient-api-server-route.yaml
- ambient-control-plane-sa.yaml
- tenant-rbac/
- ambient-tenant-ingress-netpol.yaml

patches:
- path: ambient-api-server-args-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: ambient-api-server-service-ca-patch.yaml
  target:
    kind: Service
    name: ambient-api-server
    version: v1

images:
- name: quay.io/ambient_code/acp_api_server
  newTag: latest
- name: quay.io/ambient_code/acp_api_server:latest
  newName: quay.io/ambient_code/acp_api_server
  newTag: latest
- name: quay.io/ambient_code/acp_control_plane
  newTag: latest
- name: quay.io/ambient_code/acp_control_plane:latest
  newName: quay.io/ambient_code/acp_control_plane
  newTag: latest
- name: quay.io/ambient_code/acp_mcp
  newTag: latest
