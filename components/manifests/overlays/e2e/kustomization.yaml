apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-code

# Resources (base + e2e-specific)
resources:
- ../../base
- secrets.yaml
- test-user.yaml
# backend-ingress removed - all traffic goes through frontend (Next.js proxies to backend)
- minio-credentials.yaml
- postgresql-credentials.yaml
- mlflow-db-credentials.yaml
# PostgreSQL init scripts for database creation
- postgresql-init-scripts.yaml

# Patches for e2e environment
patches:
- path: namespace-patch.yaml
  target:
    kind: Namespace
    name: ambient-code
- path: minio-pvc-patch.yaml
  target:
    kind: PersistentVolumeClaim
    name: minio-data
- path: minio-resources-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: minio
# PostgreSQL: add init-scripts volume for database creation
- path: postgresql-init-scripts-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: postgresql
