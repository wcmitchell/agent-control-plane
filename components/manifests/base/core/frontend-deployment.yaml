apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      containers:
      - name: frontend
        imagePullPolicy: Always
        image: quay.io/ambient_code/vteam_frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: BACKEND_URL
          value: "http://backend-service:8080/api"
        - name: API_SERVER_URL
          value: "http://ambient-api-server:8000"
        - name: NODE_ENV
          value: "production"
        - name: GITHUB_APP_SLUG
          value: "ambient-code"
        # Note: Langfuse feedback now handled by runner, not frontend
        # Unleash feature flags (optional - proxy routes disabled when not set)
        - name: UNLEASH_URL
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: unleash-url
              optional: true
        - name: UNLEASH_CLIENT_KEY
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: client-api-token
              optional: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    name: http
  type: ClusterIP
