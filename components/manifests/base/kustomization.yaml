apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: vteam-ambient-runner-base

resources:
- core
- rbac
- platform
- ambient-control-plane-service.yml
- ambient-control-plane-token-svc.yaml
- runner-networkpolicy.yaml

# Default images (can be overridden by overlays)
images:
- name: quay.io/ambient_code/acp_claude_runner
  newTag: latest
- name: quay.io/ambient_code/acp_api_server
  newTag: latest
- name: quay.io/ambient_code/acp_control_plane
  newTag: latest
- name: quay.io/ambient_code/acp_mcp
  newTag: latest
