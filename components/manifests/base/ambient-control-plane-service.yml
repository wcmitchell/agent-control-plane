---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-control-plane
  labels:
    app: ambient-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambient-control-plane
  template:
    metadata:
      labels:
        app: ambient-control-plane
    spec:
      serviceAccountName: ambient-control-plane
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ambient-control-plane
        image: quay.io/ambient_code/acp_control_plane:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
        - name: AMBIENT_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: ambient-control-plane-token
              key: token
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ambient-api-server
              key: clientId
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ambient-api-server
              key: clientSecret
        - name: AMBIENT_API_SERVER_URL
          value: "https://ambient-api-server.ambient-code.svc.cluster.local:8000"
        - name: AMBIENT_GRPC_SERVER_ADDR
          value: "ambient-api-server.ambient-code.svc.cluster.local:9000"
        - name: AMBIENT_GRPC_USE_TLS
          value: "true"
        - name: MODE
          value: "kube"
        - name: LOG_LEVEL
          value: "info"
        - name: RUNNER_IMAGE
          value: "quay.io/ambient_code/acp_claude_runner:latest"
        - name: MCP_IMAGE
          value: "quay.io/ambient_code/acp_mcp:latest"
        - name: GITHUB_MCP_IMAGE
          value: "quay.io/ambient_code/acp_credential_github:latest"
        - name: JIRA_MCP_IMAGE
          value: "quay.io/ambient_code/acp_credential_jira:latest"
        - name: K8S_MCP_IMAGE
          value: "quay.io/ambient_code/acp_credential_k8s:latest"
        - name: GOOGLE_MCP_IMAGE
          value: "quay.io/ambient_code/acp_credential_google:latest"
        - name: USE_VERTEX
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: USE_VERTEX
              optional: true
        - name: CLOUD_ML_REGION
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: CLOUD_ML_REGION
              optional: true
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: ANTHROPIC_VERTEX_PROJECT_ID
              optional: true
        - name: GOOGLE_APPLICATION_CREDENTIALS
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: GOOGLE_APPLICATION_CREDENTIALS
              optional: true
        - name: CP_TOKEN_URL
          value: "http://ambient-control-plane.ambient-code.svc.cluster.local:8080/token"
        - name: CP_RUNTIME_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: vertex-credentials
          mountPath: /app/vertex
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: vertex-credentials
        secret:
          secretName: ambient-vertex
          optional: true
      restartPolicy: Always
