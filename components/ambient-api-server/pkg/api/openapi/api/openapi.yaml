            description: Health status (server-managed)
            enum:
            - Ready
            - NotReady
            - Unknown
            readOnly: true
            type: string
          status_message:
            description: Human-readable status detail
            readOnly: true
            type: string
          labels:
            description: JSONB placement selectors
            type: string
          annotations:
            description: JSONB freeform metadata
            type: string
          capacity:
            description: JSONB reported node allocatable
            readOnly: true
            type: string
          last_heartbeat_at:
            description: Last successful health check timestamp
            format: date-time
            readOnly: true
            type: string
        required:
        - api_server_url
        - name
        - role
        type: object
      example:
        status_message: status_message
        role: gateway
        kind: kind
        created_at: 2000-01-23T04:56:07.000+00:00
        description: description
        annotations: annotations
        labels: labels
        capacity: capacity
        updated_at: 2000-01-23T04:56:07.000+00:00
        name: name
        id: id
        href: href
        last_heartbeat_at: 2000-01-23T04:56:07.000+00:00
        api_server_url: api_server_url
        credential_id: credential_id
