        required: false
        schema:
          type: string
      - description: "Max events to return (default 100, max 1000)"
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          type: integer
      - description: Filter events created after this timestamp (ISO 8601)
        in: query
        name: start_time
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter events created before this timestamp (ISO 8601)
        in: query
        name: end_time
        required: false
        schema:
          format: date-time
          type: string
