          updated_at: 2000-01-23T04:56:07.000+00:00
          name: name
          id: id
          href: href
          last_heartbeat_at: 2000-01-23T04:56:07.000+00:00
          api_server_url: api_server_url
          credential_id: credential_id
          status: Ready
    ClusterPatchRequest:
      example:
        role: gateway
        name: name
        description: description
        annotations: annotations
        api_server_url: api_server_url
        credential_id: credential_id
        labels: labels
      properties:
        name:
          type: string
        description:
          type: string
        api_server_url:
          type: string
        credential_id:
          type: string
        role:
          enum:
          - gateway
          - workload
          - hybrid
          type: string
        labels:
          type: string
        annotations:
          type: string
      type: object
    ClusterStatusResponse:
      example:
        status_message: status_message
        id: id
        last_heartbeat_at: 2000-01-23T04:56:07.000+00:00
        status: status
        capacity: capacity
      properties:
        id:
          type: string
        status:
          type: string
        status_message:
          type: string
        capacity:
          type: string
        last_heartbeat_at:
          format: date-time
          type: string
      type: object
    Payload:
      example:
        repo_url: repo_url
        ref: ref
        sandbox_path: sandbox_path
        content: content
      properties:
        sandbox_path:
          description: Absolute path inside the sandbox where the content is delivered.
          type: string
        content:
          description: Inline string content to place at the sandbox path.
          type: string
        repo_url:
          description: Git repository URL to clone into the sandbox path.
          type: string
        ref:
          description: "Git ref to check out (branch, tag, or commit SHA). Only valid\
            \ with repo_url."
          type: string
      required:
      - sandbox_path
      type: object
    SandboxTemplate:
      example:
        image: image
        runtime_class_name: runtime_class_name
        log_level: log_level
        resources:
          memory: memory
          cpu: cpu
        annotations:
          key: annotations
        gpu:
          count: 2
        driver_config:
          key: ""
        labels:
          key: labels
      properties:
        image:
          description: OCI container image reference for the sandbox.
          type: string
        resources:
          $ref: "#/components/schemas/ResourceRequirements"
        gpu:
          $ref: "#/components/schemas/GpuRequirements"
        runtime_class_name:
          description: Kubernetes RuntimeClassName for the sandbox pod.
          type: string
        driver_config:
          additionalProperties: true
          description: OpenShell driver-specific opaque configuration (JSON).
          type: object
        labels:
          additionalProperties:
            type: string
          description: Labels applied to the sandbox compute resources.
          type: object
        annotations:
          additionalProperties:
            type: string
          description: Annotations applied to the sandbox compute resources.
          type: object
        log_level:
          description: "Sandbox supervisor log verbosity (debug, info, warn, error)."
          type: string
      type: object
    ResourceRequirements:
      example:
        memory: memory
        cpu: cpu
      properties:
        cpu:
          description: "CPU request/limit in Kubernetes quantity format (e.g., \"\
            2\", \"500m\")."
          type: string
        memory:
          description: "Memory request/limit in Kubernetes quantity format (e.g.,\
            \ \"4Gi\", \"256Mi\")."
          type: string
      type: object
    GpuRequirements:
      example:
        count: 2
      properties:
        count:
          description: Number of GPUs to allocate. Default 0.
          type: integer
      type: object
    GatewayOidc:
      description: OIDC authentication configuration for the gateway
      example:
        scopes_claim: scopes_claim
        user_role: user_role
        audience: openshell-cli
        admin_role: admin_role
        jwks_ttl: 5
        roles_claim: roles_claim
        issuer: issuer
      properties:
        issuer:
          description: OIDC issuer URL; empty disables OIDC
          type: string
        audience:
          default: openshell-cli
          description: Expected aud claim value in JWT
          type: string
        jwks_ttl:
          default: 3600
          description: JWKS key cache retention in seconds
          type: integer
        roles_claim:
          description: Dot-delimited path to roles array in JWT claims
          type: string
        admin_role:
          description: Role name conferring admin access
          type: string
        user_role:
          description: Role name conferring standard user access
          type: string
        scopes_claim:
          description: Dot-delimited path to scopes array in JWT claims
          type: string
      type: object
    GatewayRoute:
      description: Route configuration for external gateway exposure on OpenShift
      example:
        host: host
      properties:
        host:
          description: "Hostname for the OpenShift Route. If empty, OpenShift assigns\
            \ a hostname based on the cluster's default routing suffix."
          type: string
      type: object
  securitySchemes:
    Bearer:
      bearerFormat: JWT
      scheme: bearer
      type: http
