components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ObjectReference:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        href:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    List:
      type: object
      properties:
        kind:
          type: string
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
        - kind
        - page
        - size
        - total
        - items
    Error:
      allOf:
      - $ref: '#/components/schemas/ObjectReference'
      - type: object
        properties:
          code:
            type: string
          reason:
            type: string
          operation_id:
            type: string
    Session:
      $ref: 'openapi.sessions.yaml#/components/schemas/Session'
    SessionList:
      $ref: 'openapi.sessions.yaml#/components/schemas/SessionList'
    SessionPatchRequest:
      $ref: 'openapi.sessions.yaml#/components/schemas/SessionPatchRequest'
    SessionStatusPatchRequest:
      $ref: 'openapi.sessions.yaml#/components/schemas/SessionStatusPatchRequest'
    Project:
      $ref: 'openapi.projects.yaml#/components/schemas/Project'
    ProjectList:
      $ref: 'openapi.projects.yaml#/components/schemas/ProjectList'
    ProjectPatchRequest:
      $ref: 'openapi.projects.yaml#/components/schemas/ProjectPatchRequest'
    ProjectSettings:
      $ref: 'openapi.projectSettings.yaml#/components/schemas/ProjectSettings'
    ProjectSettingsList:
      $ref: 'openapi.projectSettings.yaml#/components/schemas/ProjectSettingsList'
    ProjectSettingsPatchRequest:
      $ref: 'openapi.projectSettings.yaml#/components/schemas/ProjectSettingsPatchRequest'
    User:
      $ref: 'openapi.users.yaml#/components/schemas/User'
    UserList:
      $ref: 'openapi.users.yaml#/components/schemas/UserList'
    UserPatchRequest:
      $ref: 'openapi.users.yaml#/components/schemas/UserPatchRequest'
    Role:
      $ref: 'openapi.roles.yaml#/components/schemas/Role'
    RoleList:
      $ref: 'openapi.roles.yaml#/components/schemas/RoleList'
    RolePatchRequest:
      $ref: 'openapi.roles.yaml#/components/schemas/RolePatchRequest'
    RoleBinding:
      $ref: 'openapi.roleBindings.yaml#/components/schemas/RoleBinding'
    RoleBindingList:
      $ref: 'openapi.roleBindings.yaml#/components/schemas/RoleBindingList'
    RoleBindingPatchRequest:
      $ref: 'openapi.roleBindings.yaml#/components/schemas/RoleBindingPatchRequest'
    SessionMessage:
      $ref: 'openapi.sessionMessages.yaml#/components/schemas/SessionMessage'
    SessionMessageList:
      $ref: 'openapi.sessionMessages.yaml#/components/schemas/SessionMessageList'
    SessionMessagePushRequest:
      $ref: 'openapi.sessionMessages.yaml#/components/schemas/SessionMessagePushRequest'
    Agent:
      $ref: 'openapi.agents.yaml#/components/schemas/Agent'
    AgentList:
      $ref: 'openapi.agents.yaml#/components/schemas/AgentList'
    AgentPatchRequest:
      $ref: 'openapi.agents.yaml#/components/schemas/AgentPatchRequest'
    AgentSessionList:
      $ref: 'openapi.agents.yaml#/components/schemas/AgentSessionList'
    StartRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Task scope for this specific run (Session.prompt)
    StartResponse:
      type: object
      properties:
        session:
          $ref: 'openapi.sessions.yaml#/components/schemas/Session'
        start_prompt:
          type: string
          description: Assembled start prompt — Agent.prompt + Inbox + Session.prompt + peer roster
    ProjectHome:
      type: object
      properties:
        project_id:
          type: string
        agents:
          type: array
          items:
            $ref: '#/components/schemas/ProjectHomeAgent'
    ProjectHomeAgent:
      type: object
      properties:
        agent_id:
          type: string
        agent_name:
          type: string
        session_phase:
          type: string
        inbox_unread_count:
          type: integer
        summary:
          type: string
    InboxMessage:
      $ref: 'openapi.inbox.yaml#/components/schemas/InboxMessage'
    InboxMessageList:
      $ref: 'openapi.inbox.yaml#/components/schemas/InboxMessageList'
    InboxMessagePatchRequest:
      $ref: 'openapi.inbox.yaml#/components/schemas/InboxMessagePatchRequest'
    Credential:
      $ref: 'openapi.credentials.yaml#/components/schemas/Credential'
    CredentialList:
      $ref: 'openapi.credentials.yaml#/components/schemas/CredentialList'
    CredentialPatchRequest:
      $ref: 'openapi.credentials.yaml#/components/schemas/CredentialPatchRequest'
    CredentialTokenResponse:
      $ref: 'openapi.credentials.yaml#/components/schemas/CredentialTokenResponse'
    ScheduledSession:
      $ref: 'openapi.scheduledSessions.yaml#/components/schemas/ScheduledSession'
    ScheduledSessionList:
      $ref: 'openapi.scheduledSessions.yaml#/components/schemas/ScheduledSessionList'
    ScheduledSessionPatchRequest:
      $ref: 'openapi.scheduledSessions.yaml#/components/schemas/ScheduledSessionPatchRequest'
    Provider:
      $ref: 'openapi.providers.yaml#/components/schemas/Provider'
    ProviderList:
      $ref: 'openapi.providers.yaml#/components/schemas/ProviderList'
    ProviderPatchRequest:
      $ref: 'openapi.providers.yaml#/components/schemas/ProviderPatchRequest'
    Policy:
      $ref: 'openapi.policies.yaml#/components/schemas/Policy'
    PolicyList:
      $ref: 'openapi.policies.yaml#/components/schemas/PolicyList'
    PolicyPatchRequest:
      $ref: 'openapi.policies.yaml#/components/schemas/PolicyPatchRequest'
    # AUTO-ADD NEW SCHEMAS
  parameters:
    id:
      name: id
      in: path
      description: The id of record
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      description: Page number of record list when record list exceeds specified page size
      schema:
        type: integer
        default: 1
        minimum: 1
      required: false
    size:
      name: size
      in: query
      description: Maximum number of records to return
      schema:
        type: integer
        default: 100
        minimum: 0
      required: false
    search:
      name: search
      in: query
      required: false
      description: Specifies the search criteria
      schema:
        type: string
    orderBy:
      name: orderBy
      in: query
      required: false
      description: Specifies the order by criteria
      schema:
        type: string
    fields:
      name: fields
      in: query
      required: false
      description: Supplies a comma-separated list of fields to be returned
      schema:
        type: string
security:
  - Bearer: []
