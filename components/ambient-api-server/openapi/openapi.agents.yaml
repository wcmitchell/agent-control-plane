paths:
  /api/ambient/v1/projects/{id}/agents:
    get:
      summary: Returns a list of agents in a project
      security:
        - Bearer: []
      responses:
        '200':
          description: A JSON array of agent objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No project with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/fields'
    post:
      summary: Create an agent in a project
      security:
        - Bearer: []
      requestBody:
        description: Agent data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: Validation errors occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No project with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '409':
          description: Agent already exists in this project
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: An unexpected error occurred creating the agent
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
  /api/ambient/v1/projects/{id}/agents/{agent_id}:
    get:
      summary: Get an agent by id
      security:
        - Bearer: []
      responses:
        '200':
          description: Agent found by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    patch:
      summary: Update an agent (name, prompt, labels, annotations)
      security:
        - Bearer: []
      requestBody:
        description: Updated agent data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPatchRequest'
      responses:
        '200':
          description: Agent updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: Validation errors occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error updating agent
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    delete:
      summary: Delete an agent from a project
      security:
        - Bearer: []
      responses:
        '204':
          description: Agent deleted successfully
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: agent_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/agents/{agent_id}/start:
    post:
      summary: Start an agent — creates a Session (idempotent)
      description: |
        Creates a new Session for this Agent and drains the inbox into the start context.
        If an active session already exists, it is returned as-is.
        Unread Inbox messages are marked read and injected as context before the first turn.
      security:
        - Bearer: []
      requestBody:
        description: Optional start parameters
        required: false
        content:
          application/json:
            schema:
              $ref: 'openapi.yaml#/components/schemas/StartRequest'
      responses:
        '200':
          description: Session already active — returned as-is
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/StartResponse'
        '201':
          description: New session created and started
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/StartResponse'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: agent_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/agents/{agent_id}/ignition:
    get:
      summary: Preview start context (dry run — no session created)
      security:
        - Bearer: []
      responses:
        '200':
          description: Start context preview
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/StartResponse'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: agent_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/agents/{agent_id}/sessions:
    get:
      summary: Get session run history for an agent
      security:
        - Bearer: []
      responses:
        '200':
          description: Session run history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionList'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No agent with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
    parameters:
      - $ref: '#/components/parameters/id'
      - name: agent_id
        in: path
        description: The id of the agent
        required: true
        schema:
          type: string
  /api/ambient/v1/projects/{id}/home:
    get:
      summary: Project home — latest status for every Agent in this project
      security:
        - Bearer: []
      responses:
        '200':
          description: Project home dashboard payload
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/ProjectHome'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No project with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
components:
  schemas:
    Agent:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/ObjectReference'
        - type: object
          required:
            - project_id
            - name
          properties:
            project_id:
              type: string
              description: The project this agent belongs to
            owner_user_id:
              type: string
            name:
              type: string
              description: Human-readable identifier; unique within the project
            display_name:
              type: string
            description:
              type: string
            prompt:
              type: string
              description: Defines who this agent is. Mutable via PATCH. Access controlled by RBAC.
            repo_url:
              type: string
            workflow_id:
              type: string
            llm_model:
              type: string
            llm_temperature:
              type: number
              format: double
            llm_max_tokens:
              type: integer
              format: int32
            bot_account_name:
              type: string
            resource_overrides:
              type: string
            environment_variables:
              type: string
            entrypoint:
              type: string
              description: CLI binary to launch inside the sandbox (e.g., claude, opencode, bash). Defaults to claude.
            providers:
              type: array
              items:
                type: string
              description: Names of providers this agent requires, referencing provider declarations in the tenant namespace.
            payloads:
              type: array
              items:
                $ref: '#/components/schemas/Payload'
              description: Content to upload into the sandbox filesystem before the entrypoint launches.
            environment:
              type: object
              additionalProperties:
                type: string
              description: Environment variables injected into the sandbox at creation time.
            sandbox_template:
              $ref: '#/components/schemas/SandboxTemplate'
            sandbox_policy:
              type: string
              description: Name of a policy declaration in the tenant namespace. When omitted, the platform default policy applies.
            current_session_id:
              type: string
              readOnly: true
              description: Denormalized for fast reads — the active session, if any
            labels:
              type: string
            annotations:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    AgentList:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/List'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Agent'
    AgentPatchRequest:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        prompt:
          type: string
          description: Update agent prompt (access controlled by RBAC)
        repo_url:
          type: string
        llm_model:
          type: string
        llm_temperature:
          type: number
          format: double
        llm_max_tokens:
          type: integer
          format: int32
        entrypoint:
          type: string
        providers:
          type: array
          items:
            type: string
        payloads:
          type: array
          items:
            $ref: '#/components/schemas/Payload'
        environment:
          type: object
          additionalProperties:
            type: string
        sandbox_template:
          $ref: '#/components/schemas/SandboxTemplate'
        sandbox_policy:
          type: string
        labels:
          type: string
        annotations:
          type: string
    Payload:
      type: object
      required:
        - sandbox_path
      properties:
        sandbox_path:
          type: string
          description: Absolute path inside the sandbox where the content is delivered.
        content:
          type: string
          description: Inline string content to place at the sandbox path.
        repo_url:
          type: string
          description: Git repository URL to clone into the sandbox path.
        ref:
          type: string
          description: Git ref to check out (branch, tag, or commit SHA). Only valid with repo_url.
    SandboxTemplate:
      type: object
      properties:
        image:
          type: string
          description: OCI container image reference for the sandbox.
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        gpu:
          $ref: '#/components/schemas/GpuRequirements'
        runtime_class_name:
          type: string
          description: Kubernetes RuntimeClassName for the sandbox pod.
        driver_config:
          type: object
          additionalProperties: true
          description: OpenShell driver-specific opaque configuration (JSON).
        labels:
          type: object
          additionalProperties:
            type: string
          description: Labels applied to the sandbox compute resources.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Annotations applied to the sandbox compute resources.
        log_level:
          type: string
          description: Sandbox supervisor log verbosity (debug, info, warn, error).
    ResourceRequirements:
      type: object
      properties:
        cpu:
          type: string
          description: CPU request/limit in Kubernetes quantity format (e.g., "2", "500m").
        memory:
          type: string
          description: Memory request/limit in Kubernetes quantity format (e.g., "4Gi", "256Mi").
    GpuRequirements:
      type: object
      properties:
        count:
          type: integer
          description: Number of GPUs to allocate. Default 0.
    AgentSessionList:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/List'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: 'openapi.sessions.yaml#/components/schemas/Session'
  parameters:
    id:
      name: id
      in: path
      description: The id of the project
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      description: Page number of record list when record list exceeds specified page size
      schema:
        type: integer
        default: 1
        minimum: 1
      required: false
    size:
      name: size
      in: query
      description: Maximum number of records to return
      schema:
        type: integer
        default: 100
        minimum: 0
      required: false
    search:
      name: search
      in: query
      required: false
      description: Specifies the search criteria
      schema:
        type: string
    orderBy:
      name: orderBy
      in: query
      required: false
      description: Specifies the order by criteria
      schema:
        type: string
    fields:
      name: fields
      in: query
      required: false
      description: Supplies a comma-separated list of fields to be returned
      schema:
        type: string
