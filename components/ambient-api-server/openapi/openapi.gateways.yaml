paths:
  # NEW ENDPOINT START
  /api/ambient/v1/projects/{id}/gateways:
  # NEW ENDPOINT END
    get:
      summary: Returns a list of gateways for a project
      security:
        - Bearer: []
      responses:
        '200':
          description: A JSON array of gateway objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayList'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/fields'
    post:
      summary: Create a new gateway in a project
      security:
        - Bearer: []
      requestBody:
        description: Gateway data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Gateway'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gateway'
        '400':
          description: Validation errors occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '409':
          description: Gateway already exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: An unexpected error occurred creating the gateway
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
  # NEW ENDPOINT START
  /api/ambient/v1/projects/{id}/gateways/{gateway_id}:
  # NEW ENDPOINT END
    get:
      summary: Get a gateway by id
      security:
        - Bearer: []
      responses:
        '200':
          description: Gateway found by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gateway'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No gateway with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    patch:
      summary: Update a gateway
      security:
        - Bearer: []
      requestBody:
        description: Updated gateway data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayPatchRequest'
      responses:
        '200':
          description: Gateway updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gateway'
        '400':
          description: Validation errors occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No gateway with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '409':
          description: Gateway already exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error updating gateway
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    delete:
      summary: Delete a gateway
      security:
        - Bearer: []
      responses:
        '204':
          description: Gateway deleted successfully
        '401':
          description: Auth token is invalid
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '403':
          description: Unauthorized to perform operation
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '404':
          description: No gateway with specified id exists
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
        '500':
          description: Unexpected error occurred
          content:
            application/json:
              schema:
                $ref: 'openapi.yaml#/components/schemas/Error'
    parameters:
      - $ref: '#/components/parameters/id'
      - $ref: '#/components/parameters/gateway_id'
components:
  schemas:
    # NEW SCHEMA START
    Gateway:
    # NEW SCHEMA END
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/ObjectReference'
        - type: object
          required:
            - name
            - project_id
            - server_dns_names
          properties:
            name:
              type: string
              description: Resource name (typically openshell-gateway)
            project_id:
              type: string
              description: The project this gateway belongs to
            image:
              type: string
              description: Gateway container image reference
            server_dns_names:
              type: array
              items:
                type: string
              description: DNS names for TLS certificate generation
            config:
              type: string
              description: OpenShell gateway TOML configuration
            labels:
              type: string
              description: JSON-encoded labels
            annotations:
              type: string
              description: JSON-encoded annotations
            oidc:
              $ref: '#/components/schemas/GatewayOidc'
    # NEW SCHEMA START
    GatewayOidc:
    # NEW SCHEMA END
      type: object
      description: OIDC authentication configuration for the gateway
      properties:
        issuer:
          type: string
          description: OIDC issuer URL; empty disables OIDC
        audience:
          type: string
          description: Expected aud claim value in JWT
          default: "openshell-cli"
        jwks_ttl:
          type: integer
          description: JWKS key cache retention in seconds
          default: 3600
        roles_claim:
          type: string
          description: Dot-delimited path to roles array in JWT claims
        admin_role:
          type: string
          description: Role name conferring admin access
        user_role:
          type: string
          description: Role name conferring standard user access
        scopes_claim:
          type: string
          description: Dot-delimited path to scopes array in JWT claims
    # NEW SCHEMA START
    GatewayList:
    # NEW SCHEMA END
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/List'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Gateway'
    # NEW SCHEMA START
    GatewayPatchRequest:
    # NEW SCHEMA END
      type: object
      properties:
        name:
          type: string
        image:
          type: string
        server_dns_names:
          type: array
          items:
            type: string
        config:
          type: string
        labels:
          type: string
        annotations:
          type: string
        oidc:
          $ref: '#/components/schemas/GatewayOidc'
  parameters:
      id:
        name: id
        in: path
        description: The id of the project
        required: true
        schema:
          type: string
      gateway_id:
        name: gateway_id
        in: path
        description: The id of the gateway
        required: true
        schema:
          type: string
      page:
        name: page
        in: query
        description: Page number of record list when record list exceeds specified page size
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      size:
        name: size
        in: query
        description: Maximum number of records to return
        schema:
          type: integer
          default: 100
          minimum: 0
        required: false
      search:
        name: search
        in: query
        required: false
        description: |-
          Specifies the search criteria. The syntax of this parameter is
          similar to the syntax of the _where_ clause of an SQL statement,
          using the names of the json attributes / column names of the account.
          For example, in order to retrieve all the gateways with a name
          starting with `openshell`:

          ```sql
          name like 'openshell%'
          ```

          If the parameter isn't provided, or if the value is empty, then
          all the gateways that the user has permission to see will be
          returned.
        schema:
          type: string
      orderBy:
        name: orderBy
        in: query
        required: false
        description: |-
          Specifies the order by criteria. The syntax of this parameter is
          similar to the syntax of the _order by_ clause of an SQL statement,
          but using the names of the json attributes / column of the account.
          For example, in order to retrieve all gateways ordered by name:

          ```sql
          name asc
          ```

          If the parameter isn't provided, or if the value is empty, then
          no explicit ordering will be applied.
        schema:
          type: string
      fields:
        name: fields
        in: query
        required: false
        description: |-
          Supplies a comma-separated list of fields to be returned.
          Fields of sub-structures and of arrays use <structure>.<field> notation.
          <stucture>.* means all field of a structure
          Example: For each Gateway to get id, href, name and project_id

          ```
          curl "/api/ambient/v1/projects/{id}/gateways?fields=id,href,name,project_id"
          ```
        schema:
          type: string
